name_target: 'JUPITER'
date_obs: "20241214" #vedere nome cartella file

telescope: 'SRT'
num_ch_map: all #numero di canali con cui fare la mappa. Se si vogliono tutti i pixel, scrivere 'all'

paths:
  instrumentation: 'configs/instrument/telescope/SRT.yaml'
  # Location of files (ra, dec, cal) .fits
  # datadir: "data/input/base_test"
  datadir: "data/input/20241214-204624"
  output: "data/output"
  #File of the channels' responsivity
  resp:  #'/home/eleobar/MISTRAL_gen+map-maker/optical_responsivity_new_lowSNR_200mK.pkl'

scan:
  flag_track: True
  beammap_filename: "metadata/chp_offset_rel8_14DEC24_matteo.dat"
  angle_offset: 0
  projection: SIN #'SIN', 'GNOM', "EQ"
  frame: AZEL # 'AZEL' oppure 'RADEC'

  detector_validity:
    upper_threshold: 7
    lower_threshold: 7

map_making:
  pixel_size: 6 arcsec
  npix: [256, 256] # x, y

calibration:
  tau: 0.16
  T_atm: 267

  method:
    kind: None # SKYDIP # or hf or None
    params: {}
   # per hf passo min_freq

filtering:
  #info of box around source to mask during baseline removal and filtering
  radius: 0 arcsec

  debug:
    plot_cm: False
    plot_corr_matrix: False

  mask_without_radius:
    mode: cutted
    offset: 0.1
    sigma: 6
    maxiters: 10


  steps:

    mask_with_radius:

      - op: remove_baseline
        params:
          deg: 4

    mask_without_radius:

      - op: linear_detrend
        params: { }

    common: []
